apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: pylon
  labels:
    app: api
    pool: general
  annotations:
    # Progressive rollout is driven by the Pylon operator, not by
    # editing this file. Steps: canary -> 10% -> 100%, SLO-checked at
    # each step. See docs/adr/0001-progressive-rollouts.md.
    pylon.dev/rollout: progressive
    pylon.dev/rollout-steps: "canary,10,100"
    pylon.dev/slo-gate: "availability>=99.9,p99<300ms"
spec:
  replicas: 6
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
    spec:
      # Bound the blast radius of node maintenance / evictions.
      # Relates to PI-220 (eviction-storm runbook).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api
      containers:
        - name: api
          image: registry.internal/pylon/api:1.8.2
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          envFrom:
            # Decrypted in-cluster by the sealed-secrets controller.
            # Only the SealedSecret ciphertext is committed.
            - secretRef:
                name: api-secrets
