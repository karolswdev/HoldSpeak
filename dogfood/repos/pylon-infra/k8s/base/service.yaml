apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: pylon
  labels:
    app: api
  annotations:
    # Stable service fronting the progressive rollout. The operator
    # shifts endpoints behind this Service rather than swapping it.
    pylon.dev/stable: "true"
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api
  namespace: pylon
spec:
  # Keep a quorum during node drains so cordon/drain can't take the
  # whole service down at once (PI-220 risk control).
  minAvailable: 4
  selector:
    matchLabels:
      app: api
