<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HoldSpeak Activity</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111d;
        --panel: #0d1a2a;
        --panel-2: #102237;
        --line: rgba(180, 207, 235, 0.18);
        --text: #edf5ff;
        --muted: #9db1c8;
        --accent: #64d7ff;
        --ok: #75f4d3;
        --warn: #ffb86b;
        --danger: #ff647e;
        --font: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        --mono: "SFMono-Regular", Consolas, monospace;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
      }
      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }
      .topbar, .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 8px;
      }
      .topbar {
        padding: 18px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 14px;
      }
      h1, h2, p { margin: 0; }
      h1 { font-size: 1.35rem; }
      .sub { color: var(--muted); margin-top: 6px; line-height: 1.45; }
      .grid {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 14px;
      }
      .panel { padding: 16px; }
      .panel + .panel { margin-top: 14px; }
      .panel h2 { font-size: 1rem; margin-bottom: 12px; }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 10px 0;
        border-top: 1px solid var(--line);
      }
      .row:first-of-type { border-top: 0; }
      .label { color: var(--muted); }
      .value { font-family: var(--mono); font-size: 0.88rem; text-align: right; }
      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--ok);
        background: rgba(117, 244, 211, 0.08);
        font-size: 0.86rem;
      }
      .status-pill.paused {
        color: var(--warn);
        background: rgba(255, 184, 107, 0.08);
      }
      button, input, select {
        min-height: 38px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
      }
      button {
        padding: 0 12px;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #06111c;
      }
      button.danger {
        color: var(--danger);
      }
      input, select {
        width: 100%;
        padding: 0 10px;
      }
      input[type="checkbox"] {
        width: auto;
        min-height: auto;
      }
      .button-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .form-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-top: 10px;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field label {
        color: var(--muted);
        font-size: 0.82rem;
      }
      .toggle-field {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        color: var(--muted);
      }
      .rule-list, .preview-list, .candidate-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .rule-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.03);
      }
      .rule-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .records {
        display: grid;
        gap: 10px;
      }
      .record {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.035);
        border-radius: 8px;
        padding: 12px;
      }
      .record-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }
      .record-title {
        font-weight: 700;
        overflow-wrap: anywhere;
      }
      .record-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }
      .tag {
        font-family: var(--mono);
        color: var(--accent);
        font-size: 0.78rem;
        white-space: nowrap;
      }
      .empty {
        color: var(--muted);
        padding: 24px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        text-align: center;
      }
      .error { color: var(--danger); margin-top: 10px; }
      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
        .field-grid { grid-template-columns: 1fr; }
        .topbar { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Local Activity</h1>
          <p class="sub">Private browser-history metadata used as plugin context. Local only, inspectable, pausable, and deletable.</p>
        </div>
        <span id="enabled-pill" class="status-pill">Loading</span>
      </section>

      <div class="grid">
        <aside>
          <section class="panel">
            <h2>Controls</h2>
            <div class="row">
              <span class="label">Records</span>
              <span id="record-count" class="value">0</span>
            </div>
            <div class="row">
              <span class="label">Retention days</span>
              <span id="retention-value" class="value">30</span>
            </div>
            <div class="button-row">
              <button id="toggle-enabled" class="primary" type="button">Pause</button>
              <button id="refresh" type="button">Refresh</button>
              <button id="clear" class="danger" type="button">Clear imported</button>
            </div>
            <div class="form-row">
              <input id="retention-input" type="number" min="1" max="3650" value="30" aria-label="Retention days" />
              <button id="save-retention" type="button">Save</button>
            </div>
            <p id="message" class="sub"></p>
            <p id="error" class="error"></p>
          </section>

          <section class="panel">
            <h2>Sources</h2>
            <div id="sources"></div>
          </section>

          <section class="panel">
            <h2>Excluded Domains</h2>
            <div class="form-row">
              <input id="domain-input" placeholder="example.com" aria-label="Domain to exclude" />
              <button id="exclude-domain" type="button">Exclude</button>
            </div>
            <div id="domains"></div>
          </section>
        </aside>

        <div>
          <section class="panel">
            <h2>Project Rules</h2>
            <input id="rule-id" type="hidden" />
            <div class="field-grid">
              <div class="field">
                <label for="rule-project">Project</label>
                <select id="rule-project"></select>
              </div>
              <div class="field">
                <label for="rule-match-type">Match</label>
                <select id="rule-match-type">
                  <option value="domain">Domain</option>
                  <option value="url_contains">URL contains</option>
                  <option value="title_contains">Title contains</option>
                  <option value="entity_type">Entity type</option>
                  <option value="entity_id_prefix">Entity ID prefix</option>
                  <option value="github_repo">GitHub repo</option>
                  <option value="source_browser">Source browser</option>
                </select>
              </div>
              <div class="field">
                <label for="rule-pattern">Pattern</label>
                <input id="rule-pattern" placeholder="example.com" />
              </div>
              <div class="field">
                <label for="rule-entity-type">Entity type</label>
                <input id="rule-entity-type" placeholder="optional" />
              </div>
              <div class="field">
                <label for="rule-name">Name</label>
                <input id="rule-name" placeholder="HoldSpeak Jira" />
              </div>
              <div class="field">
                <label for="rule-priority">Priority</label>
                <input id="rule-priority" type="number" value="100" />
              </div>
            </div>
            <label class="toggle-field">
              <input id="rule-enabled" type="checkbox" checked />
              Enabled
            </label>
            <div class="button-row">
              <button id="preview-rule" type="button">Preview</button>
              <button id="save-rule" class="primary" type="button">Save rule</button>
              <button id="reset-rule" type="button">New</button>
              <button id="apply-rules" type="button">Apply all</button>
            </div>
            <div id="rule-preview" class="preview-list"></div>
            <div id="rules" class="rule-list"></div>
          </section>

          <section class="panel">
            <h2>Meeting Candidates</h2>
            <div class="button-row">
              <button id="preview-candidates" type="button">Preview</button>
              <button id="refresh-candidates" type="button">Refresh saved</button>
              <button id="clear-dismissed-candidates" class="danger" type="button">Clear dismissed</button>
            </div>
            <div id="candidate-preview" class="candidate-list"></div>
            <div id="meeting-candidates" class="candidate-list"></div>
          </section>

          <section class="panel">
            <h2>Recent Activity</h2>
            <div id="records" class="records"></div>
          </section>
        </div>
      </div>
    </main>

    <script>
      const state = {
        status: null,
        activity: null,
        projects: [],
        rules: [],
        candidatePreviews: [],
        meetingCandidates: [],
      };
      const $ = (id) => document.getElementById(id);

      async function request(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || response.statusText);
        return payload;
      }

      function setMessage(text, isError = false) {
        $("message").textContent = isError ? "" : text;
        $("error").textContent = isError ? text : "";
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[char]));
      }

      function renderStatus() {
        const status = state.status || {};
        const settings = status.settings || { enabled: true, retention_days: 30 };
        const pill = $("enabled-pill");
        pill.textContent = settings.enabled ? "Enabled" : "Paused";
        pill.classList.toggle("paused", !settings.enabled);
        $("toggle-enabled").textContent = settings.enabled ? "Pause" : "Resume";
        $("record-count").textContent = String(status.record_count || 0);
        $("retention-value").textContent = String(settings.retention_days || 30);
        $("retention-input").value = String(settings.retention_days || 30);

        const sources = status.sources || [];
        $("sources").innerHTML = sources.length
          ? sources.map((source) => `
              <div class="row">
                <span class="label">${escapeHtml(source.source_browser)} / ${escapeHtml(source.source_profile)}</span>
                <span class="value">${source.enabled ? "enabled" : "paused"}</span>
              </div>
            `).join("")
          : `<div class="empty">No readable browser sources found.</div>`;

        const rules = (status.domain_rules || []).filter((rule) => rule.action === "exclude");
        $("domains").innerHTML = rules.length
          ? rules.map((rule) => `
              <div class="row">
                <span class="label">${escapeHtml(rule.domain)}</span>
                <button type="button" data-remove-domain="${escapeHtml(rule.domain)}">Remove</button>
              </div>
            `).join("")
          : `<p class="sub">No domains excluded.</p>`;
      }

      function renderProjects() {
        $("rule-project").innerHTML = state.projects.length
          ? state.projects.map((project) => `
              <option value="${escapeHtml(project.id)}">${escapeHtml(project.name)}</option>
            `).join("")
          : `<option value="">No projects</option>`;
      }

      function renderRules() {
        $("rules").innerHTML = state.rules.length
          ? state.rules.map((rule) => `
              <article class="rule-item">
                <div class="record-top">
                  <div>
                    <div class="record-title">${escapeHtml(rule.name || rule.pattern)}</div>
                    <div class="record-meta">
                      ${escapeHtml(rule.project_name || rule.project_id)} · ${escapeHtml(rule.match_type)} · ${escapeHtml(rule.pattern)}
                      ${rule.entity_type ? ` · ${escapeHtml(rule.entity_type)}` : ""}
                    </div>
                  </div>
                  <div class="tag">${rule.enabled ? "enabled" : "off"} · ${Number(rule.priority || 0)}</div>
                </div>
                <div class="rule-actions">
                  <button type="button" data-edit-rule="${escapeHtml(rule.id)}">Edit</button>
                  <button class="danger" type="button" data-delete-rule="${escapeHtml(rule.id)}">Delete</button>
                </div>
              </article>
            `).join("")
          : `<div class="empty">No project rules yet.</div>`;
      }

      function renderRecords() {
        const records = (state.activity && state.activity.records) || [];
        $("records").innerHTML = records.length
          ? records.map((record) => `
              <article class="record">
                <div class="record-top">
                  <div class="record-title">${escapeHtml(record.title || record.url)}</div>
                  <div class="tag">${escapeHtml(record.project_id || record.entity_type || "domain")}</div>
                </div>
                <div class="record-meta">
                  ${escapeHtml(record.entity_id || record.domain)} · ${escapeHtml(record.source_browser)} · visits ${Number(record.visit_count || 0)}
                  <br />
                  ${escapeHtml(record.last_seen_at || "no timestamp")} · ${escapeHtml(record.url)}
                </div>
              </article>
            `).join("")
          : `<div class="empty">No imported activity yet.</div>`;
      }

      function renderCandidatePreviews() {
        const previews = state.candidatePreviews || [];
        $("candidate-preview").innerHTML = previews.length
          ? previews.map((candidate, index) => `
              <article class="rule-item">
                <div class="record-top">
                  <div>
                    <div class="record-title">${escapeHtml(candidate.title)}</div>
                    <div class="record-meta">
                      ${escapeHtml(candidate.source_connector_id)} · confidence ${Number(candidate.confidence || 0).toFixed(2)}
                      <br />
                      ${escapeHtml(candidate.meeting_url || "")}
                    </div>
                  </div>
                  <div class="tag">preview</div>
                </div>
                <div class="rule-actions">
                  <button type="button" data-save-candidate="${index}">Save</button>
                </div>
              </article>
            `).join("")
          : `<div class="empty">No candidate previews loaded.</div>`;
      }

      function renderMeetingCandidates() {
        const candidates = state.meetingCandidates || [];
        $("meeting-candidates").innerHTML = candidates.length
          ? candidates.map((candidate) => `
              <article class="rule-item">
                <div class="record-top">
                  <div>
                    <div class="record-title">${escapeHtml(candidate.title)}</div>
                    <div class="record-meta">
                      ${escapeHtml(candidate.source_connector_id)} · confidence ${Number(candidate.confidence || 0).toFixed(2)}
                      <br />
                      ${escapeHtml(candidate.meeting_url || "")}
                    </div>
                  </div>
                  <div class="tag">${escapeHtml(candidate.status)}</div>
                </div>
                <div class="rule-actions">
                  <button type="button" data-candidate-status="armed" data-candidate-id="${escapeHtml(candidate.id)}">Arm</button>
                  <button type="button" data-candidate-status="dismissed" data-candidate-id="${escapeHtml(candidate.id)}">Dismiss</button>
                  <button type="button" data-candidate-status="candidate" data-candidate-id="${escapeHtml(candidate.id)}">Reset</button>
                </div>
              </article>
            `).join("")
          : `<div class="empty">No saved meeting candidates.</div>`;
      }

      function resetRuleForm() {
        $("rule-id").value = "";
        $("rule-name").value = "";
        $("rule-pattern").value = "";
        $("rule-entity-type").value = "";
        $("rule-priority").value = "100";
        $("rule-enabled").checked = true;
        $("rule-match-type").value = "domain";
        $("rule-preview").innerHTML = "";
      }

      function rulePayload() {
        return {
          project_id: $("rule-project").value,
          name: $("rule-name").value.trim(),
          match_type: $("rule-match-type").value,
          pattern: $("rule-pattern").value.trim(),
          entity_type: $("rule-entity-type").value.trim() || null,
          priority: Number($("rule-priority").value || 100),
          enabled: $("rule-enabled").checked,
        };
      }

      function editRule(rule) {
        $("rule-id").value = rule.id;
        $("rule-project").value = rule.project_id;
        $("rule-name").value = rule.name || "";
        $("rule-match-type").value = rule.match_type;
        $("rule-pattern").value = rule.pattern;
        $("rule-entity-type").value = rule.entity_type || "";
        $("rule-priority").value = String(rule.priority || 100);
        $("rule-enabled").checked = Boolean(rule.enabled);
        $("rule-preview").innerHTML = "";
      }

      function renderPreview(matches) {
        $("rule-preview").innerHTML = matches.length
          ? matches.slice(0, 8).map((record) => `
              <article class="rule-item">
                <div class="record-title">${escapeHtml(record.title || record.url)}</div>
                <div class="record-meta">${escapeHtml(record.entity_id || record.domain)} · ${escapeHtml(record.url)}</div>
              </article>
            `).join("")
          : `<div class="empty">No matches.</div>`;
      }

      async function load() {
        try {
          const [status, activity, projects, rules, candidates] = await Promise.all([
            request("/api/activity/status"),
            request("/api/activity/records?limit=100"),
            request("/api/projects"),
            request("/api/activity/project-rules"),
            request("/api/activity/meeting-candidates"),
          ]);
          state.status = status;
          state.activity = activity;
          state.projects = projects.projects || [];
          state.rules = rules.rules || [];
          state.meetingCandidates = candidates.candidates || [];
          renderStatus();
          renderProjects();
          renderRules();
          renderCandidatePreviews();
          renderMeetingCandidates();
          renderRecords();
          setMessage("");
        } catch (error) {
          setMessage(error.message, true);
        }
      }

      $("toggle-enabled").addEventListener("click", async () => {
        const enabled = !(state.status && state.status.settings && state.status.settings.enabled);
        try {
          const payload = await request("/api/activity/settings", {
            method: "PUT",
            body: JSON.stringify({ enabled }),
          });
          state.status = payload.status;
          renderStatus();
          setMessage(enabled ? "Activity ingestion resumed." : "Activity ingestion paused.");
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("refresh").addEventListener("click", async () => {
        try {
          await request("/api/activity/refresh", { method: "POST", body: "{}" });
          setMessage("Activity refreshed.");
          await load();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("clear").addEventListener("click", async () => {
        if (!confirm("Delete imported activity records?")) return;
        try {
          await request("/api/activity/records", { method: "DELETE" });
          setMessage("Imported activity cleared.");
          await load();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("save-retention").addEventListener("click", async () => {
        try {
          const retention_days = Number($("retention-input").value || 30);
          const payload = await request("/api/activity/settings", {
            method: "PUT",
            body: JSON.stringify({ retention_days }),
          });
          state.status = payload.status;
          renderStatus();
          setMessage("Retention saved.");
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("exclude-domain").addEventListener("click", async () => {
        const domain = $("domain-input").value.trim();
        if (!domain) return;
        try {
          const payload = await request("/api/activity/domains", {
            method: "POST",
            body: JSON.stringify({ domain, action: "exclude" }),
          });
          state.status = payload.status;
          $("domain-input").value = "";
          renderStatus();
          setMessage(`${domain} excluded.`);
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("domains").addEventListener("click", async (event) => {
        const button = event.target.closest("[data-remove-domain]");
        if (!button) return;
        const domain = button.getAttribute("data-remove-domain");
        try {
          const payload = await request(`/api/activity/domains/${encodeURIComponent(domain)}`, { method: "DELETE" });
          state.status = payload.status;
          renderStatus();
          setMessage(`${domain} removed.`);
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("preview-rule").addEventListener("click", async () => {
        try {
          const payload = await request("/api/activity/project-rules/preview", {
            method: "POST",
            body: JSON.stringify(rulePayload()),
          });
          renderPreview(payload.matches || []);
          setMessage(`${payload.count || 0} matching records.`);
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("save-rule").addEventListener("click", async () => {
        try {
          const id = $("rule-id").value;
          const payload = await request(
            id ? `/api/activity/project-rules/${encodeURIComponent(id)}` : "/api/activity/project-rules",
            {
              method: id ? "PUT" : "POST",
              body: JSON.stringify(rulePayload()),
            },
          );
          const saved = payload.rule;
          await load();
          editRule(saved);
          setMessage("Project rule saved.");
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("reset-rule").addEventListener("click", () => {
        resetRuleForm();
        setMessage("");
      });

      $("apply-rules").addEventListener("click", async () => {
        try {
          const payload = await request("/api/activity/project-rules/apply", {
            method: "POST",
            body: "{}",
          });
          setMessage(`${payload.updated || 0} records updated.`);
          await load();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("rules").addEventListener("click", async (event) => {
        const edit = event.target.closest("[data-edit-rule]");
        const remove = event.target.closest("[data-delete-rule]");
        if (edit) {
          const id = edit.getAttribute("data-edit-rule");
          const rule = state.rules.find((item) => item.id === id);
          if (rule) editRule(rule);
          return;
        }
        if (!remove) return;
        const id = remove.getAttribute("data-delete-rule");
        try {
          await request(`/api/activity/project-rules/${encodeURIComponent(id)}`, { method: "DELETE" });
          resetRuleForm();
          setMessage("Project rule deleted.");
          await load();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("preview-candidates").addEventListener("click", async () => {
        try {
          const payload = await request("/api/activity/meeting-candidates/preview");
          state.candidatePreviews = payload.candidates || [];
          renderCandidatePreviews();
          setMessage(`${payload.count || 0} meeting candidates found.`);
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("refresh-candidates").addEventListener("click", async () => {
        try {
          const payload = await request("/api/activity/meeting-candidates");
          state.meetingCandidates = payload.candidates || [];
          renderMeetingCandidates();
          setMessage(`${payload.count || 0} saved meeting candidates.`);
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("candidate-preview").addEventListener("click", async (event) => {
        const button = event.target.closest("[data-save-candidate]");
        if (!button) return;
        const candidate = state.candidatePreviews[Number(button.getAttribute("data-save-candidate"))];
        if (!candidate) return;
        try {
          await request("/api/activity/meeting-candidates", {
            method: "POST",
            body: JSON.stringify({
              source_connector_id: candidate.source_connector_id,
              source_activity_record_id: candidate.source_activity_record_id,
              title: candidate.title,
              starts_at: candidate.starts_at,
              ends_at: candidate.ends_at,
              meeting_url: candidate.meeting_url,
              confidence: candidate.confidence,
            }),
          });
          setMessage("Meeting candidate saved.");
          await load();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("meeting-candidates").addEventListener("click", async (event) => {
        const button = event.target.closest("[data-candidate-status]");
        if (!button) return;
        const id = button.getAttribute("data-candidate-id");
        const status = button.getAttribute("data-candidate-status");
        try {
          await request(`/api/activity/meeting-candidates/${encodeURIComponent(id)}/status`, {
            method: "PUT",
            body: JSON.stringify({ status }),
          });
          setMessage(`Meeting candidate marked ${status}.`);
          await load();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $("clear-dismissed-candidates").addEventListener("click", async () => {
        try {
          const payload = await request("/api/activity/meeting-candidates?status=dismissed", { method: "DELETE" });
          setMessage(`${payload.deleted || 0} dismissed candidates cleared.`);
          await load();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      load();
    </script>
  </body>
</html>
