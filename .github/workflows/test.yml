name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests with coverage
        run: |
          # `uv run --extra test` syncs the project venv *with* the test extra
          # (pytest et al.) and runs in that same venv — no separate --system
          # install that uv run would otherwise ignore.
          uv run --extra test pytest tests/unit/ -q --cov=holdspeak --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unit
          name: unit-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests (macOS)
    runs-on: macos-14  # Apple Silicon

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          # Install PortAudio for sounddevice
          brew install portaudio

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"  # Astro 6 requires Node >=22.12
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        # The web/* integration tests serve the built Astro output from
        # holdspeak/static/_built/ (gitignored), so it must be built here.
        working-directory: web
        run: |
          npm install -g npm@11
          npm ci
          npm run build

      - name: Run integration tests with coverage
        run: |
          # `uv run --extra test` resolves main + test deps into the venv it
          # executes in, so pytest is present (the old --system install went to
          # a different interpreter that uv run never used).
          #
          # HS-32-04: this job is where the ungated core-path smoke test
          # (tests/integration/test_core_path_smoke.py) runs for real — macOS
          # arm64 has `mlx-whisper` as a core dep, so the test drives a fixed
          # checked-in WAV through real Whisper ("tiny", downloaded on first
          # use) -> text -> the injection seam, asserting on the produced text.
          # It skips on backends-absent environments (e.g. the Linux unit job)
          # rather than being gated behind the never-in-CI metal/spoken_e2e
          # markers.
          uv run --extra test python -m pytest tests/integration/ -v --cov=holdspeak --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: integration
          name: integration-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: E2E Tests (macOS)
    runs-on: macos-14  # Apple Silicon

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          # Install PortAudio for sounddevice
          brew install portaudio

      - name: Run E2E tests with coverage
        run: |
          # Mock-based e2e (excluding metal hardware tests). `uv run --extra test`
          # runs in the venv it just synced the test extra into.
          uv run --extra test python -m pytest tests/e2e/ -v -m "e2e and not metal" --cov=holdspeak --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: e2e
          name: e2e-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  linux-smoke:
    name: Linux Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libportaudio2

      - name: Install dependencies
        run: |
          # Linux smoke should use explicit Linux extras and avoid Apple-only deps.
          uv pip install -e ".[test,linux]" --system

      - name: Run Linux smoke checks
        run: |
          bash scripts/linux_smoke.sh

  all-tests:
    name: All Tests Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, linux-smoke]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.linux-smoke.result }}" == "failure" ]]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All test jobs passed or were skipped"
