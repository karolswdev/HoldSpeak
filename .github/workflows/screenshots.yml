name: Screenshots

# Captures a PNG of every web route on PRs that touch the front-end and
# uploads them as a build artifact, so a UI change can be eyeballed from
# the PR without checking it out. Best-effort review aid — not a gate.

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"

jobs:
  shots:
    name: Route screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"  # Astro 6 requires Node >=22.12
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps (incl. Chrome for Puppeteer)
        working-directory: web
        run: |
          npm install --no-audit --no-fund

      - name: Capture route screenshots
        working-directory: web
        run: npm run shots

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-screenshots
          path: web/.shots/**/*.png
          if-no-files-found: warn
