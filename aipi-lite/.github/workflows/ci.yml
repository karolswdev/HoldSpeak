name: CI

on:
  push:
    branches: [main, mine]
  pull_request:
    branches: [main]
  # Allow manual runs for ad-hoc verification.
  workflow_dispatch:

# Cancel a stale run when a new push lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        # Pinned to the same version as requirements-dev.txt so a CI
        # mismatch can't surprise a developer who ran ruff locally.
        run: pip install ruff==0.15.12
      - name: ruff check
        run: ruff check .

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is the project's minimum (see docs/HOLDSPEAK_BRIDGE.md §2);
        # 3.12 is the dev environment.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: pytest
        # The protocol-sync test is opt-in (skips if HoldSpeak isn't
        # checked out next to this repo); CI environment doesn't have
        # the sibling repo so those will skip cleanly.
        run: pytest -v
