id: f-workbench-graph-author
execution_target: ios_classic_swift
title: Author a graph in the classic iPad shell and run it byte-faithfully
# HSM-22-01: build a node graph (blueprint) on the iPad with runs-on per node,
# save it, and have the classic app dispatch it to the desktop hub byte-faithfully.
# mesh-node-alive stages the hub-side node the authored graph runs against;
# seeded-desk gives real primitives to wire.
features:
  - mobile.workbench.graph.author
recipes:
  - seeded-desk-mesh
form_factors: [ipad]
steps:
  - do: >
      Staging-verify. Open the workbench and confirm the seeded primitives and the
      live hub node are available to wire and to run against.
    expect: >
      The workbench opens; the seeded desk objects are pickable as node inputs and
      the uat-worker node reads live as a runs-on target — a real world to author
      against, not an empty canvas.
  - do: >
      Author a multi-node graph on the iPad with runs-on set per node, then Save
      and sync it to the hub.
    expect: >
      The graph saves and syncs; the hub receives it with its wiring, control flow,
      failure_policy, and per-node runs_on intact. Authoring is real (multi-node on
      iPad), not a linear-only stub.
    form_factors: [ipad]
  - do: >
      From the classic iPad workbench, tap Run on the saved graph and inspect its
      native execution receipt plus the hub run it dispatched.
    expect: >
      The classic app's run executes the saved wired flow rather than a re-derived
      default. Its native receipt and the dispatched hub run preserve the same
      control flow, failure_policy, runs_on targets, and execution order.
teardown: []
