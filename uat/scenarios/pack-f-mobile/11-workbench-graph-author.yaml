id: f-workbench-graph-author
title: Author a graph on the iPad and run it byte-faithfully on the hub
# HSM-22-01: build a node graph (blueprint) on the iPad with runs-on per node,
# save it, and have it sync and run on the desktop hub byte-faithfully — the
# cross-surface parity crown. mesh-node-alive stages the hub-side node the
# authored graph runs against; seeded-desk gives real primitives to wire. The web
# authors linear only (honest scope), so the multi-node authoring leg is the iPad's.
features:
  - mobile.workbench.graph.author
recipes:
  - seeded-desk
  - mesh-node-alive
surfaces:
  web: yes
  ipad: yes
  iphone: {n/a: "directory row mobile.workbench.graph.author iphone=unknown — compact-width authoring is not proven; a phone-column gap, not a genuine absence"}
steps:
  - do: >
      Staging-verify. Open the workbench and confirm the seeded primitives and the
      live hub node are available to wire and to run against.
    expect: >
      The workbench opens; the seeded desk objects are pickable as node inputs and
      the uat-worker node reads live as a runs-on target — a real world to author
      against, not an empty canvas.
    where: /
  - do: >
      Author a multi-node graph on the iPad with runs-on set per node, then Save
      and sync it to the hub.
    expect: >
      The graph saves and syncs; the hub receives it with its wiring, control flow,
      failure_policy, and per-node runs_on intact. Authoring is real (multi-node on
      iPad), not a linear-only stub.
    where: /
    surfaces:
      web: {n/a: "the web workbench authors a LINEAR graph only (honest scope, 22-03); the multi-node per-node-runs-on authoring is the iPad leg"}
  - do: >
      Run the authored graph from the hub, and separately author on iPad then run
      on web.
    expect: >
      Run from the hub executes the wired flow (not a re-derived default), and the
      iPad-authored graph run on web honors the SAME graph — control flow,
      failure_policy, and runs_on match byte-faithfully across surfaces. Structural
      check: the same wiring produced the same execution order on both.
    where: /
teardown: []
