id: f-aftercare-file-issue
execution_target: ios_companion_swift
title: File a meeting action as a GitHub issue — accepted-only, honest proposed pill
# HSM-19-01: an accepted meeting action item can be filed as a GitHub issue with
# an inline repo row and an honest "proposed" pill; File issue is unavailable on a
# non-accepted action (the accept gate). functional-aftercare-review stages an
# exact pending + accepted pair through public sync, with no LLM dependency. The
# GitHub connector needs a real credential/pairing, so that half is hand-staged.
features:
  - mobile.meeting.aftercare.file_issue
recipes:
  - functional-aftercare-review
manual_setup:
  - Have the GitHub connector configured/paired for the run (a repo the issue can be proposed against) — or be ready to read the honest "not paired" state per Phase 21-03 honesty.
form_factors: [ipad]
steps:
  - do: >
      Staging-verify. Open "Owner functional review (UAT seed)" and confirm it
      has the exact pending and accepted action pair.
    expect: >
      The meeting shows "Confirm the pending-action consent gate" as pending and
      "File the accepted owner verification action" as accepted. Both are owned
      by Karol and neither depends on model wording.
  - do: >
      Negative gate. On a NON-accepted (still open / proposed) action, look for the
      File issue affordance.
    expect: >
      File issue is unavailable on a non-accepted action — you cannot file an
      action you have not accepted. The accept gate is enforced, not decorative.
  - do: Accept one action item, then tap File issue on it.
    expect: >
      After accepting, File issue is available; tapping it shows an inline repo row
      and an honest "proposed" pill — it proposes the issue rather than silently
      creating it. If the connector is not paired, the state reads honestly (not
      paired) instead of pretending to file.
teardown: []
