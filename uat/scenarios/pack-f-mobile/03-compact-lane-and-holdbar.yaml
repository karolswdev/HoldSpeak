id: f-compact-lane-and-holdbar
title: The iPhone compact desk — the filtered lane and the hold-bar teleprompter
# Two iphone:yes musts (HSM-20-02, HSM-20-04). The desk seeds via seeded-desk so
# the lane has real primitives to filter; the hold-bar is a live-mic gesture on a
# physical phone at compact width, so that beat is hand-staged. The lane is
# ipad:yes too (width authority — rotating to wide restores the diorama).
features:
  - mobile.desk.compact.lane
  - mobile.desk.compact.hold_bar_teleprompter
recipes:
  - seeded-desk
manual_setup:
  - Use a physical iPhone (or a compact-width iPhone simulator with a mic) paired to this run for the hold-bar leg.
  - Have a microphone available to speak a dictation phrase and feel the release haptic on a real device.
surfaces:
  web: {n/a: "directory row mobile.desk.compact.lane web=no — the web desk is the node canvas / diorama, a distinct surface; the compact lane is a mobile-only render. (hold_bar_teleprompter web=yes but is walked as the iPhone hold-bar variant here, not the web hold-to-talk)"}
  ipad: yes
  iphone: yes
steps:
  - do: >
      Staging-verify. On the iPhone open the desk. Confirm the seeded primitives
      arrived (notes, KBs, a zone) so the lane has something to filter.
    expect: >
      The seeded desk reads back — the dogfood notes, the Project KB, and the
      Ledgerline zone are present. The lane is populated, not empty.
    where: /
    surfaces:
      ipad: yes
  - do: >
      On the iPhone (compact width) read how the desk renders.
    expect: >
      The diorama becomes a full-width primitive lane with a kind-filter chip rail
      and an accent create FAB — not a squeezed diorama. Tapping a kind chip
      filters the list to that primitive kind.
    where: /
    surfaces:
      ipad: {n/a: "the compact lane render is the iPhone form factor; on iPad the diorama stays wide — the lane appears only below the width threshold"}
  - do: Rotate / resize the iPad to wide and confirm the diorama comes back.
    expect: >
      At wide width the diorama is restored with every primitive's position intact
      (byte-equivalent) — the compact lane and the wide diorama are the same desk
      at two widths, nothing lost across the threshold.
    where: /
    surfaces:
      iphone: {n/a: "the wide-diorama restore is the iPad width authority; the iPhone stays in the compact lane"}
  - do: >
      Hold-bar teleprompter (hand-staged). On the iPhone dictate surface, press
      and HOLD the bottom-edge HOLD BAR and speak a sentence, watching the text.
    expect: >
      The live partial reflows bottom-up with the newest words nearest the thumb —
      a teleprompter, not a top-anchored field. This is the compact variant of the
      preview.
    where: /
    surfaces:
      ipad: {n/a: "the bottom-edge HOLD BAR is the iPhone compact dictate variant (DictateView.laneBody); the iPad uses the wider preview surface"}
  - do: Release the HOLD BAR.
    expect: >
      Release commits the utterance with a heavy haptic — a felt confirmation on a
      real device that the words landed. Nothing types until release.
    surfaces:
      ipad: {n/a: "the release-to-commit hold bar with haptic is the iPhone compact gesture; not the iPad surface"}
teardown: []
