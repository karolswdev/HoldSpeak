id: c-grounded-rewrite
execution_target: web_react
title: A grounded rewrite — control (OFF) then treatment (ON)
features:
  - dictation.pipeline.intent-routing
  - dictation.kb.project_facts
recipes:
  - seeded-desk-43
form_factors: [desktop]
steps:
  # Staging-verify beat: confirm the seeded world is live before the human walk.
  - do: Confirm the seeded desk is up on .43 — the Project glossary note and Project KB are present, and the dictation runtime answers a health check.
    expect: The glossary note (uat-seed-note-glossary) and the Project KB (uat-seed-kb-project) are both visible; the runtime status reads reachable, not a dead endpoint.
    where: /
  # CONTROL leg (grounding OFF) — its own verdict.
  - do: With grounding OFF (no project context attached), dictate a rough instruction that leans on the repo, e.g. "rewrite this as a status note about the ledgerline streaming rewrite".
    expect: "The rewrite runs but cannot name the internal codename — it does not print BLUEBIRD or any KB-only fact, and if pressed it says it has no project context. This is the control leg; the token must be ABSENT here."
    where: /
  # TREATMENT leg (grounding ON) — its own separate verdict.
  - do: With grounding ON (the Project KB / glossary attached), dictate the SAME instruction again.
    expect: The treatment output names the repo-specific token the control could not — it prints BLUEBIRD (the glossary codename for the ledgerline streaming rewrite) or another KB-only fact. A no-LLM pass is insufficient; the treatment must surface what the control cannot.
    where: /
teardown: []
