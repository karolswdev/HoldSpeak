id: c-hold-to-talk
title: Hold the hotkey, speak, release — text lands in the active app
features:
  - dictation.voice-typing.hold-to-talk
  - dictation.voice_typing.hold_to_talk
manual_setup:
  # No recipe can induce a live microphone capture typing into a foreign app —
  # that is a device-local, real-mic world, so it is hand-staged.
  - Boot a HoldSpeak run and confirm a transcription model is installed (the setup surface reads ready, not "not ready yet").
  - Grant microphone permission to HoldSpeak and confirm the hold-to-talk hotkey is bound (Settings -> Voice).
  - Open a plain foreign app with an editable text field (a notes app / editor) and put the cursor in an empty field.
  - Have a short spoken phrase ready to say, e.g. "ship the ledgerline rewrite on Friday".
recipes: []
surfaces:
  web: yes
  ipad: yes      # directory: dictation.voice-typing.hold-to-talk ipad=yes (README iPad 'dictates an answer into your desk, the hub runs that text through the full dictation pipeline and types the result')
  iphone: yes    # directory: dictation.voice-typing.hold-to-talk iphone=unknown; but dictation.voice_typing.hold_to_talk iphone=yes and the Apple app serves both — hand-stage the iPhone form-factor hold-to-talk rather than false-n/a it
steps:
  # Staging-verify beat: prove the world is armed before the human speaks.
  - do: Confirm the model is ready and the hold-to-talk hotkey is bound, with the cursor in an empty foreign field.
    expect: The setup surface reads ready (not "not ready yet"), the hotkey binding is shown, and the target field is byte-for-byte empty before you speak.
  # The load-bearing beat — press, speak, release, text lands.
  - do: Hold the hotkey down, speak the short phrase, then release the hotkey.
    expect: Nothing types while the key is held except (optionally) a live indicator; on release, the transcribed text lands in the active foreign app's field — not in a HoldSpeak window. The words you said appear in the app you were typing into.
  # Honest-degradation close — the hold gesture must not silently drop.
  - do: Hold the hotkey and release it immediately without speaking.
    expect: Nothing garbled types — an empty capture lands nothing (or a clearly-empty result), it does not paste stale text from the previous capture or hang the hotkey.
  # iPhone form-factor leg — the flipped-from-unknown column, hand-walked.
  - do: On iPhone, hold the dictation control, speak the phrase, release, and let the hub run it through the pipeline.
    expect: The result types into the active desk field on the phone form factor — the same hold-to-talk gesture works on the smaller Apple app, proving the iphone=yes claim on dictation.voice_typing.hold_to_talk is real.
    surfaces:
      web: {n/a: "this beat is the iPhone form-factor hold-to-talk specifically; the web/desktop hotkey is covered by the steps above"}
      ipad: {n/a: "this beat is the iPhone form-factor specifically; the iPad remote-dictation path is covered by the surface-wide walk"}
teardown: []
