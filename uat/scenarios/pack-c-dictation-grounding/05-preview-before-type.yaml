id: c-preview-before-type
execution_target: web_react
title: Preview before it types — nothing lands until you confirm
features:
  - dictation.pipeline.preview-before-type
  - dictation.preview_before_type
  - mobile.dictation.teleprompter.preview
recipes:
  - seeded-desk-43
form_factors: [desktop]
steps:
  # Staging-verify beat: preview mode is actually armed.
  - do: Enable preview mode (Settings → Voice, or the preview toggle) and confirm it is on before dictating.
    expect: The preview toggle reads on; the dictation surface shows it will show the rewrite first rather than typing straight into the field.
    where: /
  # The load-bearing byte-lock: NOTHING types while armed.
  - do: With a text field focused, dictate a phrase. Watch the target field while the preview card is armed.
    expect: An armed preview card appears with the rewritten text, and the target field stays byte-for-byte empty — NOTHING types while the card is armed. Not a character leaks before you confirm.
    where: /
  # Type-it lands verbatim, exactly once.
  - do: Press "Type it" once.
    expect: Exactly the previewed text lands in the field, verbatim — character-for-character what the card showed, no extra rewrite pass. The token is consumed, so pressing again does not re-type it.
    where: /
  # Discard burns the token — the off path is byte-locked too.
  - do: Dictate a second phrase to arm a new preview card, then press "Discard".
    expect: The card clears and NOTHING lands in the field — the discarded text is gone, the token is burned, and a later dictation does not resurrect it.
    where: /
teardown: []
