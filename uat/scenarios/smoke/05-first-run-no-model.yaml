id: smoke-first-run-no-model
execution_target: web_react
title: First run truth at N=0
features:
  - onboarding.welcome.wizard
  - onboarding.model.setup_assistant
recipes:
  - first-run-no-model
form_factors: [desktop]
steps:
  - do: Open the app root for the first time on a machine with no optional LLM model configured.
    expect: The first-run guard opens the streamlined /welcome journey. It does not send a new user to the returning-user setup diagnostic or claim that optional intelligence is required for basic voice typing.
    where: /
  - do: Advance to the intelligence step and compare Basic voice typing with the optional model choices.
    expect: Basic voice typing is a working no-LLM path. OpenAI-compatible asks the entered server for its real model list, then offers a discovered-model picker and common-but-freely-editable context sizes. Apple Silicon and GGUF scan for real local models, offer an ordinary picker when found, and keep custom paths and install commands in secondary details. No tile merely changes a hidden backend enum.
    where: /welcome
teardown: []
