id: a-archive-facets
execution_target: web_react
title: Facet the two-meeting archive by tag and open actions
features:
  - meetings.archive.facet-search
  - meetings.archive.faceted_search
recipes:
  - pack-a-two-meetings
form_factors: [desktop]
steps:
  - do: (Staging beat) Confirm both meetings are in the archive so the facets have more than one meeting to narrow.
    expect: The archive lists the pylon incident AND the ledgerline sync — two distinct meetings, each with its tags and open-action count.
    where: /history
  - do: Filter the archive by the tag on only one meeting (ledgerline).
    expect: The list narrows to just the ledgerline sync; the pylon incident drops out. The narrowing happened on the hub against the real archive, not a stale page filtered locally.
    where: /history
  - do: (Honest-empty control) Filter by a facet value no meeting has (a speaker or tag that does not exist in either transcript).
    expect: The archive returns an honest empty result — zero meetings, no error and no stale rows left showing. An empty facet reads empty, not the unfiltered list.
    where: /history
    form_factors: [desktop]
teardown: []
