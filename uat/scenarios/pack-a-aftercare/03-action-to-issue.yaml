id: a-action-to-issue
title: Action to issue — propose, approve, execute (off-by-default actuator)
features:
  - meetings.aftercare.action-to-issue
  - meetings.aftercare.file_as_issue
recipes:
  - meeting-just-ended-open-actions
surfaces:
  web: yes
  ipad: yes
  iphone: {n/a: "the action-to-issue actuator surface on iPhone is unverified in the inventory (row iphone: unknown)"}
steps:
  - do: (Staging beat) Confirm a meeting with at least one accepted, open action exists.
    expect: The pylon meeting shows at least one open action item with an owner, ready to be turned into an issue.
    where: /history
  - do: Turn one open action into a GitHub-issue proposal, typed against a repo you name inline.
    expect: A proposal is queued, unexecuted, showing exactly what would be filed and against which repo; nothing has been sent — the proposal sits in the proposed state.
    where: /history
  - do: Approve the proposal, then read the audit.
    expect: Only on approval does it execute; the audit records who approved it and what was filed against the named repo — the off-by-default actuator flow, honestly gated.
    where: /history
    surfaces:
      ipad: {n/a: "the file-as-issue execute + audit route is web-desk (POST aftercare/file-issue; meetings.aftercare.file_as_issue ipad: unknown); the iPad proposes and reviews (mobile.meeting.aftercare.file_issue is proposed-only), execution/audit stays on the hub"}
teardown: []
