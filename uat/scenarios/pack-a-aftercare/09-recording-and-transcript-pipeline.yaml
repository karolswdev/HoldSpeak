id: a-recording-and-transcript-pipeline
execution_target: web_react
title: A file enters the full intelligence pipeline — endpoint-down control vs live treatment
features:
  - meetings.import.recording-and-transcript
recipes:
  - meeting-just-ended-open-actions
form_factors: [desktop]
steps:
  - do: (Staging beat) Confirm the world — a transcript file was imported on .43 and its intelligence pipeline ran, so a meeting exists in /history marked complete (not stuck importing) with at least one open action.
    expect: The imported pylon meeting is present in history, intel marked complete, and at least one open action is visible — the pipeline drained, it did not stall.
    where: /history
    after:
      - apply_recipe: pack-a-import-endpoint-dead
  - do: (Control — intel endpoint dead) Boot the endpoint-dead world, import the same pylon transcript file, and read the meeting's intelligence state.
    expect: The file parsed and the meeting appears immediately (honestly marked importing, then complete for the parse), but the intelligence state is an honest empty — no typed artifact cards were fabricated and the runtime status names the dead endpoint. No hallucinated summary.
    where: /history
    form_factors: [desktop]
    after:
      - apply_recipe: meeting-just-ended-open-actions
  - do: (Treatment — pipeline live on .43) Return to the live meeting and read the artifact cards the full intelligence pipeline produced from the same file.
    expect: The pipeline produced typed artifact cards the control could not — a concrete artifact for the pylon incident (an incident timeline or an open-actions list), each card carrying a confidence score and a transcript-source reference that resolves to a real segment. Judge on the decision (a headroom/expiry alert), the owner, and the risk surfaced — not on wording.
    where: /history
