id: a-belt-approval-leg
execution_target: web_react
title: Approve a story flip from the desk — the belt's gated approval leg
features:
  - belt.approval_leg
manual_setup:
  - Register a real Delivery-Workbench rails repository with the desk (a repo with a .githooks/dw and a roadmap) so the belt has a live story to act on.
  - Stage a proposal on the belt that, when approved, flips one story to done and stamps a commit — i.e. a proposal whose approval invokes the two-argv, path-allow-listed dw gate connector (decide_proposal).
  - Have the desk's actuator/connector policy in its shipped default (off / consent-required) so the approval is genuinely gated, not auto-firing.
recipes: []
form_factors: [desktop]
steps:
  - do: (Staging beat) Open the belt / conveyor and confirm the pending proposal is present, unexecuted, against the registered rails repo — and that nothing has been committed yet.
    expect: The proposal sits in the proposed state, the registered rails repo is named, and the target story is still open (not done) — the flip has not happened, so the approval that follows is provably the cause.
    where: /
  - do: Approve the proposal from the desk and watch the belt drive the gated flip.
    expect: The approval invokes the path-allow-listed two-argv dw gate connector — the target story flips to done and a stamped commit lands in the registered rails repo. The flip goes through the gate (an evidence/contract-checked commit), not a raw write to the roadmap file.
    where: /
  - do: (Honest-failure close) Stage a second proposal, but this time DECLINE it — leave it unapproved — and inspect the rails repo.
    expect: The unapproved proposal never egresses to the connector — no story flips and no commit lands until a human approves. The belt stays honest — the gated leg fires only on explicit approval, and a decline leaves the roadmap exactly as it was.
    where: /
