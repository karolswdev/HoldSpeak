id: a-unapproved-never-egresses
execution_target: web_react
title: An unapproved proposal never egresses (the honest-failure close)
features:
  - trust.egress.cloud-meeting-intel
  - meetings.aftercare.action-to-issue
  - meetings.proposals.review-anywhere
recipes:
  - egress-cloud-card
form_factors: [desktop]
steps:
  - do: (Staging beat) Confirm a pending proposal exists for the meeting, unexecuted.
    expect: “Cloud egress review (UAT seed)” has one GitHub proposal in the proposed state — created but not approved, nothing filed.
    where: /history
    verifies:
      - meetings.aftercare.action-to-issue
      - meetings.proposals.review-anywhere
  - do: >
      Read both structured egress readouts: the desk chrome's selected
      meeting-intel target and the pending proposal's per-card target.
    expect: The chrome names api.openai.com because the cloud provider was explicitly selected for this world; the proposal reads “☁ GitHub” and its preview names acme/holdspeak-uat. The sync-staged meeting itself makes no claim that intel already ran.
    where: /history
    verifies:
      - trust.egress.cloud-meeting-intel
    form_factors: [desktop]
  - do: Review the pending proposal wherever it was created, then leave it unapproved and confirm nothing left the machine.
    expect: An unapproved proposal never egresses — no issue is filed until a human approves. The card stays proposed with no executed_at or result. This is the pack's close — the product stays honest when nothing has been consented to.
    where: /history
teardown: []
