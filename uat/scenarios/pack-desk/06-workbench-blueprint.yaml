id: desk-workbench-blueprint
execution_target: web_react
title: The Workbench builds a visual intelligence blueprint
features:
  - desk.workbench.visual_builder
recipes:
  - fresh-desk
form_factors: [desktop]
steps:
  - do: Open /workbench and inspect the blueprint the page actually loads.
    expect: The built-in blueprint renders as an editable node graph rather than claiming that a seeded canonical /api/workflows record was loaded.
    where: /workbench
  - do: Add a second node, wire it after the first, and save the local blueprint.
    expect: The new node connects output→input and the saved graph remains a single unambiguous chain.
    where: /workbench
    verifies: [desk.workbench.visual_builder]
  - do: Reload /workbench in the same browser profile.
    expect: The locally saved graph returns with the same nodes and edge. Record an observation that this is browser-local prototype persistence, not canonical workflow sync.
    where: /workbench
teardown: []
