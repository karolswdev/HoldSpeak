id: desk-create-in-world
execution_target: web_react
title: Create objects in the world without leaving the desk
features:
  - desk.web.create_in_world
  - desk.recipes.in_world_authoring
recipes:
  - desk-primitives
form_factors: [desktop]
steps:
  - do: On the desk, create a new note in place (no modal takeover — the note comes into being on the desk).
    expect: A new note object appears on the desk in world; the create happened on the desk surface, not behind a separate full-screen form.
    where: /
  - do: Confirm the seeded "Summarize like a PM" recipe primitive is present and open it for editing in world.
    expect: The recipe opens showing its role ("A pragmatic PM") and its system prompt; you can edit it in place.
    where: /
  - do: Edit the recipe's system prompt and save.
    expect: The edit persists — reopening the recipe shows the new prompt, and no duplicate recipe was created.
    where: /
    form_factors: [desktop]
teardown: []
