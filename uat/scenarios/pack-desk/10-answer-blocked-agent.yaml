id: desk-answer-blocked-agent
execution_target: web_react
title: Answer a blocked agent — typed baseline and the claimed grounded draft
# The blocked coder from scenario 09, now answered two ways. The AI-draft path
# is an LLM feature, so it gets the mandatory control-vs-treatment pair: OFF
# (no model / no dropped context) cannot name the repo token; ON (grounded on
# the seeded desk, run on .43) should draft an answer that names it. If the Desk
# exposes no draft affordance/drop target, that is a direct acceptance failure.
features:
  - desk.coders.answer-grounded-or-ai-drafted
recipes:
  - agent-pane-awaiting-input-43
form_factors: [desktop]
steps:
  - do: >
      Staging-verify. A coder pane is awaiting input and the seeded desk (dogfood
      notes + KBs) is live on .43. Open the desk, find the blocked coder, and open
      its answer affordance.
    expect: >
      The blocked coder is present and offers an answer path — you can type an
      answer, or draft one with AI. The seeded desk objects (notes/KBs) are
      reachable to ground a draft.
    where: /
  - do: >
      Type a plain answer ("proceed with the migration") and inject it into the
      waiting pane.
    expect: >
      The typed answer reaches the pane — the coder is no longer stuck on the
      prompt (the pane advances past AWAITING-MIGRATION-CONFIRM). The typed path
      needs no model.
    where: /
  - do: >
      Look for the claimed AI-draft affordance on the coder answer composer. Drop
      the BLUEBIRD note (or select it through an explicit grounding picker) and
      request a grounded draft on .43.
    expect: >
      The affordance exists and the AI-drafted answer names BLUEBIRD as the
      ledgerline streaming/reconciliation rewrite. Nothing is injected until you
      approve. If no draft affordance or Desk-object grounding target exists,
      record a fail rather than imagining the control/treatment path.
    where: /
    verifies: [desk.coders.answer-grounded-or-ai-drafted]
teardown: []
