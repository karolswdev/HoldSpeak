id: desk-qlippy-decision-cards
execution_target: web_react
title: Qlippy sliding cards interrupt only for a real moment
# Qlippy's opt-in decision cards. The initial exact meeting world contains no
# proposals. After the quiet control, the conductor queues two real proposals
# through public aftercare routes while the Desk is subscribed. Honest close:
# the card's Approve sends the byte-identical decision request the dashboard does.
features:
  - qlippy.decision_cards
recipes:
  - functional-aftercare-review
manual_setup:
  - Enable both Desktop Presence and Qlippy/mascot in this isolated run's settings.
  - Open the Desk so Qlippy is subscribed before confirming the quiet control; do not create a proposal by hand.
form_factors: [desktop]
steps:
  - do: >
      CONTROL. With Qlippy subscribed but no proposal created yet, wait through
      the ordinary idle interval.
    expect: >
      Qlippy stays docked and quiet; it does not invent a decision card merely
      because the staged meeting has actions.
    where: /
    after:
      - apply_recipe: functional-qlippy-queue
  - do: >
      TREATMENT. The conductor has now queued two exact proposal events. Confirm
      the first card names its real action, the +N hint counts the other, and
      hovering pauses the auto-slide.
    expect: >
      A real proposal card slides in for the deterministic Qlippy action, the
      FIFO shows +1 for the second proposal, and hovering pauses the card — no
      synthetic or pre-page-load ping.
    where: /
  - do: >
      Honest close. Approve the action from the Qlippy card, then confirm the
      dashboard reflects the same approval.
    expect: >
      Approving from the card sends the byte-identical decision request the
      dashboard sends — the same action is approved whether you act from the card
      or the dashboard; the two paths do not diverge.
    where: /
    verifies: [qlippy.decision_cards]
teardown: []
