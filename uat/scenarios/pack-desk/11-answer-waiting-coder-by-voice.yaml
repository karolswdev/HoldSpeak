id: desk-answer-waiting-coder-by-voice
execution_target: web_react
title: Answer a waiting coder by voice — hand-staged, real mic
# The voice-answer path. No recipe can induce a live mic capture, so the capture
# beats are hand-staged. The blocked coder is auto-stageable (agent-pane recipe),
# so this rides that recipe AND a manual_setup for the mic. The honest close:
# nothing is injected without your confirming the transcript.
features:
  - desk.web.answer_waiting_coder
recipes:
  - agent-pane-awaiting-input
manual_setup:
  - Grant the desktop browser microphone permission for this run's origin.
  - Have a working input microphone and be somewhere you can speak a short sentence out loud.
form_factors: [desktop]
steps:
  - do: >
      Staging-verify. A coder pane is awaiting input. Open the desk, find the
      blocked coder, open the live session pullout, and arm the session.
    expect: >
      The blocked coder is present; after explicit arming, the live session
      composer and its hold-to-talk mic are available.
    where: /
  - do: >
      Hold the mic on the ARMED live-session composer and speak a short instruction to the
      coder ("go ahead and run the migration"). Release.
    expect: >
      Your speech is transcribed into the composer as editable text — it is NOT
      auto-sent. The transcript reads back roughly what you said (judge on
      substance, not exact punctuation).
    where: /
  - do: >
      Review the transcribed answer, then press Send to inject it into the waiting pane.
    expect: >
      Only after your explicit confirm does the answer reach the coder's pane —
      the pane advances past its prompt. Voice fills the box; you still commit.
    where: /
teardown: []
