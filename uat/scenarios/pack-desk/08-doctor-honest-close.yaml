id: desk-doctor-honest-close
execution_target: web_react
title: The honest-failure close — doctor names the dead endpoint
# The pack's honest-failure beat. The world boots with a dead intel/runtime
# endpoint; the desk itself must still read, and doctor must name what is broken
# rather than claim health. "Refuse fast, by name" is the pass bar.
features:
  - desk.doctor.honest-readout
  - desk.front-door.spatial-objects
recipes:
  - intel-endpoint-dead
form_factors: [desktop]
steps:
  - do: The endpoint is dead from boot. Open the desk anyway (staging-verify the product still runs).
    expect: The desk loads and its objects are reachable — a dead intel/runtime endpoint does not take the whole product down.
    where: /
  - do: Run holdspeak doctor (or open the doctor readout on the desk).
    expect: Doctor names the dead endpoint explicitly — it reports the unreachable URL/port as broken, and does NOT claim everything is healthy.
    where: /
  - do: Trigger a model-backed action (ask on a pile, or a rewrite) against the dead endpoint.
    expect: It refuses fast (under five seconds), naming the unreachable endpoint, rather than hanging or spinning; you always get an honest failure, not a stall.
    where: /
    form_factors: [desktop]
teardown: []
