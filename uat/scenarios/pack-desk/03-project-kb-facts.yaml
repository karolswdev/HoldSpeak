id: desk-project-kb-facts
title: The project KB holds facts the copilot can be taught
features:
  - kb.project.facts_and_context
  - desk.knowledge_bases
recipes:
  - desk-primitives
surfaces:
  web: yes
  ipad: {n/a: "Project Facts + Project Context is a web-only surface in the directory (kb.project.facts_and_context ip=?)"}
  iphone: {n/a: "Project Facts + Project Context is a web-only surface in the directory (kb.project.facts_and_context ph=?)"}
steps:
  - do: Open the "Project KB" knowledge base.
    expect: The KB opens and is empty of facts to start — an honest empty state, not a spinner or an error.
    where: /
  - do: Add a project fact to the Project KB — a name and its meaning (for example, that BLUEBIRD is the ledgerline streaming rewrite).
    expect: The fact is saved to the KB and reads back verbatim after a reload; nothing is silently reworded.
    where: /
  - do: Open the "Incident runbooks" KB and confirm it is a distinct block from the Project KB.
    expect: The two KBs are separate — a fact added to Project KB does not appear in Incident runbooks.
    where: /
teardown: []
