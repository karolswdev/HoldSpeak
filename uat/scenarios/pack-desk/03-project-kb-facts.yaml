id: desk-project-kb-facts
execution_target: web_react
title: Project Facts are taught on the detected-project dictation surface
features:
  - kb.project.facts_and_context
recipes:
  - fresh-desk
form_factors: [desktop]
steps:
  - do: Open /dictation and expand Project Facts for the detected HoldSpeak project.
    expect: The Project Facts editor names the detected project and shows key/value fact rows; this is distinct from Desk knowledge-base membership.
    where: /dictation
  - do: Add the fact UAT_CANARY = "BLUEBIRD is the ledgerline streaming rewrite", then save.
    expect: The fact is accepted as an explicit key/value entry and reads back verbatim; it is not silently rewritten into a Desk KB object.
    where: /dictation
    verifies: [kb.project.facts_and_context]
  - do: Reload /dictation, verify UAT_CANARY, then remove it and reload once more.
    expect: The saved fact survives the first reload and is absent after deletion, proving both persistence and cleanup in the project-local fact store.
    where: /dictation
teardown: []
