id: desk-front-door-spatial
title: The desk is the front door — every object lives in one spatial world
features:
  - desk.front-door.spatial-objects
  - desk.web.objects_float
  - desk.sync.profile-shape-across-surfaces
recipes:
  - desk-primitives
surfaces:
  web: yes
  ipad: yes
  iphone: {n/a: "the spatial front door on iPhone is unconfirmed in the record (desk.front-door.spatial-objects ph=?)"}
steps:
  - do: Open the app. Confirm the desk (not a list or a settings page) is the first thing you land on.
    expect: The front door is the spatial desk; notes, KBs, the zone, the recipe, and the profile all appear as objects in one world.
    where: /
  - do: Confirm the seeded "Local profile" runtime profile is present and reads the same shape it was created with.
    expect: The profile is present with its kind (onDevice) intact — the profile shape is consistent, per desk.sync.profile-shape-across-surfaces.
    where: /
  - do: Move an object to a new spot on the desk, then reload.
    expect: The object stays where you placed it after reload — free placement persists; the desk is not a reflowing list.
    where: /
    surfaces:
      ipad: yes
teardown: []
