id: desk-token-auth-arrival
title: Authenticated arrival on a token-guarded hub — hand-staged
# The token-gated arrival. No registry recipe binds a token-guarded hub, so this
# is hand-staged: bind the run to the LAN with a token and arrive via the
# ?token= link. The honest close is the security beat: arriving WITHOUT the
# token must be refused, not silently allowed. This is a real fail-loud path.
features:
  - ask.web.token_auth_arrival
manual_setup:
  - "Boot this run LAN-bound with a token (for example: uv run python -m uat.stage --recipe seeded-desk --lan) and copy the printed product URL with its ?token=... query."
  - Have a second browser profile / private window with no prior session for this run's origin (so there is no cached token).
recipes: []
surfaces:
  web: yes
  ipad: yes
  iphone: {n/a: "token-guarded arrival at iPhone compact width is unverified in the directory record (ask.web.token_auth_arrival iphone=unknown)"}
steps:
  - do: >
      Staging-verify. Open the printed ?token=... arrival URL in the clean
      browser profile.
    expect: >
      You arrive authenticated — the desk loads. The token is captured from the
      URL and the URL is scrubbed of it (the address bar no longer shows the
      token), and requests carry the X-HoldSpeak-Token header.
    where: /
  - do: >
      Reload the same page (now without the ?token= in the URL, since it was
      scrubbed).
    expect: >
      You stay authenticated across the reload — the captured token persists for
      the session; you are not bounced back to a token prompt.
    where: /
  - do: >
      Honest-failure close. In a fresh clean window, open the SAME hub URL with
      the token stripped off (no ?token=, no cached session).
    expect: >
      Arrival is REFUSED — the token-guarded hub does not serve the desk to an
      unauthenticated request; it fails closed (a 401/challenge), it does not
      silently let you in. Refuse by name beats an open door.
    where: /
teardown: []
