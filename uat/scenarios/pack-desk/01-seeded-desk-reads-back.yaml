id: desk-seeded-reads-back
execution_target: web_react
title: The primitive-rich React Desk reads back on desktop
# The staging-verify beat for the whole pack: every seeded primitive type is
# present and openable before any human judgement. Cites the front-door /
# knowledge-base / zone keys the beats actually exercise — NOT Ask-AI (no beat
# here invokes it; that lives in 04). This is the smoke-01 capability-inflation
# fix applied.
features:
  - desk.front-door.spatial-objects
  - desk.knowledge_bases
  - desk.diorama.front_door
recipes:
  - desk-primitives
form_factors: [desktop]
steps:
  - do: Open the desk. Count the objects that arrived.
    expect: The three seeded notes are present as objects — "BLUEBIRD streaming rewrite", "Pylon incident runbook", and "Questline save-format note".
    where: /
  - do: Find the two knowledge bases on the desk.
    expect: Both "Project KB" and "Incident runbooks" are present and openable.
    where: /
  - do: Find the "Ledgerline" zone and open it.
    expect: The zone is present and contains exactly the two filed notes (BLUEBIRD and Pylon); the Questline note is NOT inside it.
    where: /
    form_factors: [desktop]
teardown: []
