id: desk-lasso-ask-keep
execution_target: web_react
title: Ask over a lassoed pile, then keep or bin the printed card
# The lasso -> Ask -> keep-or-bin loop. Ask is an LLM feature, so it rides the
# mandatory control-vs-treatment pair on .43. The kept card must persist with
# its lineage; the binned one must leave no object. This is distinct from
# scenario 04's grounded-ask beat: here the focus is the KEEP/BIN lifecycle of
# the printed card as a desk object.
features:
  - ask.atom.lasso_ask_keep
recipes:
  - seeded-desk-43
form_factors: [desktop]
steps:
  - do: >
      Staging-verify. The seeded desk is live on .43. Open an empty-context model
      chat and ask "summarise this pile in one line" before selecting any object.
    expect: >
      CONTROL. The empty-context chat is generic — it cannot name BLUEBIRD or the
      pylon incident because no Desk object was supplied.
    where: /
  - do: >
      Lasso (or shift-click) the BLUEBIRD and pylon notes, confirm the bundle bar
      names exactly those objects, then ask the SAME question through Desk Ask.
    expect: >
      TREATMENT. The answer names the pile's substance (BLUEBIRD as the ledgerline rewrite,
      the pylon incident) — judged structurally on whether it surfaces the pile's
      real content, not wording. Selected pile context is always supplied on this
      path; the control used a genuinely empty-context chat.
    where: /
    verifies: [ask.atom.lasso_ask_keep]
  - do: >
      Keep the printed answer card, then confirm it persists as a desk object with
      its visible source chips.
    expect: >
      The kept card lands on the desk as its own object and its source chips name
      the selected records. Do not claim prompt/provenance fields the current
      pullout does not render.
    where: /
  - do: >
      Ask again over the same pile, and this time BIN (discard) the printed card.
    expect: >
      The binned card leaves NO object behind on the desk — discard means gone,
      not hidden. Keep persists, bin removes; the two are honestly distinct.
    where: /
teardown: []
