id: desk-agent-rail-run
execution_target: web_react
title: Run an agent persona from the rail — empty chat vs meeting-grounded chat
# Running a persona from the rail is an LLM feature, so it carries the mandatory
# control-vs-treatment pair. The world seeds a desk (with the PM recipe persona)
# on .43. The shipped persona chat grounds on meetings, not lassoed Desk notes:
# OFF selects no meeting; ON selects the staged Pylon meeting.
features:
  - desk.web.agent_rail_run
recipes:
  - meeting-just-ended-open-actions
form_factors: [desktop]
steps:
  - do: >
      Staging-verify. The Pylon meeting is complete on .43. Open the desk and
      launch a persona chat from the agent rail.
    expect: >
      The agent rail exposes a runnable persona and the chat's grounding control
      can list the staged Pylon meeting.
    where: /
  - do: >
      CONTROL. With no meeting selected, ask the persona to name the Pylon
      expiry-headroom decision and its owner.
    expect: >
      The result is generic or refuses for lack of context; it cannot know the
      staged transcript's exact headroom decision and owner.
    where: /
  - do: >
      TREATMENT. Select the staged Pylon meeting in the persona chat's grounding
      picker and ask the SAME question on .43.
    expect: >
      The result is grounded — it names the 14-day expiry-headroom decision and
      the real owner/risk. Judge structurally on substance, not wording.
    where: /
    verifies: [desk.web.agent_rail_run]
  - do: >
      Read the badge on the treatment result — where did it run?
    expect: >
      The result is badged for where it executed (the on-device/hub/mesh scope),
      not unlabeled — the provenance is asserted content, not decoration.
    where: /
teardown: []
