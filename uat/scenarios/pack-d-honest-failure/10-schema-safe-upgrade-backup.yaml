id: d-schema-safe-upgrade-backup
execution_target: cli_python
title: Safe schema upgrade and a real backup — the DB is never silently mangled
features:
  - release.schema.safe_upgrade
  - release.backup_restore.cli
  - release.doctor.database_check
recipes:
  - seeded-desk
form_factors: [local_shell]
steps:
  - do: On the seeded desk, run doctor and confirm it reads the database + config health (the staging beat).
    expect: doctor names the database and its schema version and reports it healthy; the seeded desk's notes/KBs are counted honestly, no false green.
  - do: Take a backup of the whole database via the backup CLI, then restore it into a clean location.
    expect: The backup writes a real artifact and the restore round-trips — the restored DB carries the same seeded notes and KBs (counts match); backup/restore is a real operation, not a no-op.
  - do: Confront the loader with a DB whose schema version is set NEWER than this build understands (a crafted-forward DB).
    expect: The product REFUSES the newer schema and leaves the file untouched — it does not silently downgrade, migrate, or corrupt it; the refusal names the version mismatch. An older-schema DB is instead backed-up-then-migrated, not refused.
teardown: []
