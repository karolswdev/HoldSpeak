id: d-cloud-intel-opt-in
title: Cloud meeting intel only ever egresses on an explicit provider choice
features:
  - trust.egress.cloud-meeting-intel
recipes:
  - seeded-desk
  - intel-endpoint-dead
# The re-eval: trust.egress.cloud-meeting-intel is a MUST. This is the
# control-vs-treatment pair for the cloud-egress boundary, judged structurally:
#   control (OFF)  = no cloud provider chosen -> a transcript's intel never
#                    leaves the machine; with the local endpoint dead it refuses
#                    fast rather than silently reaching a cloud.
#   treatment (ON) = the tester EXPLICITLY selects a cloud provider -> the intel
#                    egress is now named and badged with that provider's target.
# Two ORDERED, separately-verdicted steps — one verdict each.
surfaces:
  web: yes
  ipad: {n/a: "cloud meeting-intel provider selection is a web-runtime setting; the directory marks trust.egress.cloud-meeting-intel with no ipad surface"}
  iphone: {n/a: "same — provider selection is host/web side (trust.egress.cloud-meeting-intel iphone: unknown)"}
steps:
  - do: Confirm no cloud intel provider is configured (the staging beat — the default posture).
    expect: The meeting-intel egress posture reads local/none; no cloud provider is selected and the desk is seeded and healthy.
    where: /
  - do: CONTROL (cloud off) — with the local intel endpoint dead and no cloud provider chosen, run intel on a transcript.
    expect: Intel does NOT reach out to any cloud — it refuses fast naming the dead LOCAL endpoint, or degrades honestly; nothing egresses because no provider was chosen.
    where: /
  - do: TREATMENT (cloud on) — explicitly select a cloud intel provider in settings, then look at the meeting-intel egress posture.
    expect: The egress posture flips to NOT-local and names the chosen provider as the target; the flip happened only because the tester made the explicit choice, never by default.
    where: /
teardown: []
