id: d-egress-cloud-flip
execution_target: web_react
title: The egress badge flips — a local note vs a card that names its cloud target
features:
  - trust.egress_badge
  - trust.egress.desk-github-issue
  - trust.egress.badge-tells-truth
recipes:
  - seeded-desk
# The re-eval's finding #10: every badge scenario only ever confirms "local".
# The falsifiable case is the FLIP to a named cloud target. This is a
# control-vs-treatment pair on egress posture, judged structurally:
#   control  = a purely local note  -> badge reads local, names no remote
#   treatment = a GitHub-issue proposal card off a real meeting -> pill names
#               the exact target (the gh repo / the endpoint), no marketing prose.
# The inventory's old open question is now resolved: history renders a
# per-proposal egress badge from the proposal target, and the expanded card
# exposes the exact structured destination. The recipe probe reads that same
# proposal through /api/meetings/{id}/proposals.
form_factors: [desktop]
steps:
  - do: On the seeded desk, open a purely local note (the control — nothing here leaves the machine).
    expect: The note's egress badge reads local and names no remote target; this is the OFF state the flip must be measured against.
    where: /
    verifies:
      - trust.egress_badge
      - trust.egress.badge-tells-truth
    after:
      - apply_recipe: egress-cloud-card
  - do: In History, open “Cloud egress review (UAT seed)” and expand its pending GitHub proposal (the treatment — this card WILL leave the machine only on approval).
    expect: The per-card badge reads “☁ GitHub”; the structured preview names acme/holdspeak-uat exactly; status remains Awaiting approval and no execution/result exists.
    where: /history
    verifies:
      - trust.egress.desk-github-issue
      - trust.egress.badge-tells-truth
teardown: []
