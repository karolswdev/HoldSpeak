id: g-named-key-allowlist
title: Only allow-listed named keys reach tmux — an arbitrary string can never become a keystroke
features:
  - trust.steering.named-key-allowlist
recipes:
  - agent-pane-awaiting-input
# trust.steering.named-key-allowlist is web:yes + ipad:yes (README iPad key
# control; ios consumes /api/coders/{key}/keys + relay/{node}/keys). iPhone is
# genuinely unknown in the record (key palette at compact width unverified), so it
# is the honest n/a — not the ipad leg.
surfaces:
  web: yes
  ipad: yes
  iphone: {n/a: "the key palette at iPhone compact width is unverified in the directory record (trust.steering.named-key-allowlist iphone: unknown)"}
steps:
  - do: >
      Staging-verify. A real coder pane ("coder") is live and awaiting input,
      printing its AWAITING-MIGRATION-CONFIRM prompt. Confirm it is listed and
      shows the prompt.
    expect: The "coder" pane is listed and its peek shows the AWAITING-MIGRATION-CONFIRM prompt — a live session you could steer.
    where: /
  - do: >
      Arm the pane, then send named keys from the key palette (e.g. Enter,
      Down, "y"). Watch the pane react.
    expect: >
      The allow-listed named keys reach tmux and the pane advances (the prompt
      responds). Only keys the palette names are deliverable — the named-key
      allow-list is what reaches the session.
    where: /
  - do: >
      (The refusal — the honest close) With the pane armed, attempt to deliver an
      arbitrary raw string / an unlisted control sequence (not one of the named
      keys) as a keystroke.
    expect: >
      The arbitrary string is REFUSED — it never becomes a keystroke. Only
      allow-listed named keys reach tmux; a free-form string cannot be smuggled
      through the keys route even on an armed pane. This is the close: the surface
      that can move a real session accepts named keys only, nothing arbitrary.
    where: /
teardown: []
