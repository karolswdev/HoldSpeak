id: g-governance-gate
title: The actuator governance gate — off by default, and what opening it takes
features:
  - actuators.governance.gate
  - actuators.proposal.approve_execute
recipes:
  - meeting-just-ended-open-actions
  - pack-g-actuators-armed
# The proposal lifecycle and the gate live on the web desk (GET /proposals +
# POST decision; MeetingConfig.allow_actuators). The iPad has the ProposalsClient
# contract and reviews/approves, so its arming/approve leg is walked; execution +
# audit stay hub-side. iPhone is genuinely unknown in the directory record.
surfaces:
  web: yes
  ipad: yes
  iphone: {n/a: "the actuator proposal/approve surface on iPhone is unverified in the directory record (actuators.* rows iphone: unknown)"}
steps:
  - do: >
      Staging-verify (control desk). On the default golden-43 desk
      (meeting-just-ended-open-actions), confirm the pylon meeting exists with at
      least one accepted, open action item.
    expect: The pylon meeting shows at least one open action item with an owner — the thing an actuator would act on.
    where: /history
  - do: >
      (Control — gate CLOSED) On this default desk, turn an open action into a
      proposal, approve it, and watch what execution does. allow_actuators is off
      and the allow-list is empty here.
    expect: >
      The proposal can be created and approved, but execution is REFUSED by the
      governance gate — the refusal names the policy (an ActuatorPolicyError /
      "actuators disabled" message), and nothing is filed or posted. Approval
      alone does not open the gate; the master switch is off.
    where: /history
    surfaces:
      ipad: {n/a: "reading the ActuatorPolicyError refusal on execute is a hub-side proposal-decision route; the iPad reviews/approves but the execute+refusal readout is web-desk (actuators.governance.gate ipad: unknown)"}
  - do: >
      (Treatment — gate OPEN) Restage on the actuator-armed desk, then open the
      same open action, propose again, and approve.
    expect: >
      With the master switch on AND the actuator id on the per-project allow-list,
      the approved proposal now executes; the audit records who approved it and
      what ran. The ONLY thing that changed is the gate config — same action, same
      approval, opposite outcome. This is the honest close: consent + policy, both
      required.
    where: /history
    after:
      - apply_recipe: pack-g-actuators-armed
    surfaces:
      ipad: {n/a: "the execute-on-approve + audit readout is the hub-side proposal-decision route; the iPad's leg is propose/approve, execution/audit stays on the web desk (actuators.proposal.approve_execute ipad: unknown)"}
teardown: []
