id: g-mesh-relay-egress
execution_target: web_react
title: The mesh relay carries only prompt and result — no keys transit, and it fails by name
features:
  - trust.egress.mesh-relay
recipes:
  - mesh-node-alive
  - mesh-node-just-died
form_factors: [desktop]
steps:
  - do: >
      Staging-verify. Open the profiles / mesh view and confirm the "uat-worker"
      meshNode reads live — the hub has seen it poll the relay queue (the mesh's
      only heartbeat).
    expect: The "uat-worker" node reads live; it is a selectable runs-on target for a mesh dispatch.
    where: /
  - do: >
      Dispatch a small ask/run at the live "uat-worker" node, then inspect what
      actually crossed the relay for that job (the relay queue / job record).
    expect: >
      The relay carried only the prompt and the returned result between hub and the
      node you named — no API keys, no profile secrets, no local file paths ride
      the relay. The result comes back badged for where it ran (the named node),
      never masquerading as local.
    where: /
  - do: >
      Kill the relay node's process group mid-run, refresh, then dispatch again at
      the now-dead node.
    expect: >
      The node reads offline and the forced dispatch refuses fast, BY NAME — it
      names "uat-worker" as unreachable rather than hanging or silently falling
      back. Nothing new transits a dead relay. This is the honest close: the relay
      only ever moved prompt+result, and when its node is gone it says so by name.
    where: /
    after:
      - apply_recipe: mesh-node-just-died
teardown: []
