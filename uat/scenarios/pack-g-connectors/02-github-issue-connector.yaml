id: g-github-issue-connector
execution_target: web_react
title: File a GitHub issue from an approved proposal (hand-staged connector)
features:
  - actuators.connector.github_issue
  - trust.egress.desk-github-issue
recipes:
  - pack-g-actuators-armed
manual_setup:
  - Have an authenticated `gh` on this machine (`gh auth status` is logged in) pointed at a throwaway repo you own — the GitHub connector files via the host's own `gh`, no token is stored or crosses the wire.
  - Note the owner/name of that throwaway repo; you will type it inline when proposing.
form_factors: [desktop]
steps:
  - do: >
      Staging-verify. On the actuator-armed desk, confirm the pylon meeting has an
      open action and that github_issue is allow-listed (the gate is open for it).
    expect: The pylon meeting shows at least one open action; the github_issue actuator is available (not greyed out by the gate).
    where: /history
  - do: >
      Turn an open action into a github_issue proposal, typing your throwaway
      repo inline. Read the proposal BEFORE approving.
    expect: >
      A proposal is queued, unexecuted, showing exactly the issue title/body that
      would be filed and against which repo. Nothing has been sent — it sits in
      the proposed state. Its egress badge marks this as a cloud/outbound action
      (the desk-github-issue egress), never local, never prose.
    where: /history
  - do: >
      Approve the proposal, then check the throwaway repo's issues and read the
      audit.
    expect: >
      Only on approval does one issue appear in the repo — created via your own
      `gh`. The audit records who approved it and the issue URL. Exactly one issue
      is filed (not a duplicate per refresh); nothing left the machine before the
      approval.
    where: /history
teardown: []
