id: b-fire-while-dictating
execution_target: web_react
title: Speak the keyword mid-dictation and it fires the action, not types it
features:
  - macros.voice_commands.fire_while_dictating
  - macros.voice_commands.board
recipes:
  - seeded-desk
form_factors: [desktop]
steps:
  - do: >
      Staging-verify. On the seeded desk, open the Voice Commands board and bind a
      spoken keyword (e.g. "new note") to a real action, so there is a live
      mapping for the dictation path to consume.
    expect: The board shows the keyword bound to a concrete action; the mapping is saved and live.
    where: /
  - do: >
      Control — dictate a phrase that does NOT contain the mapped keyword, e.g.
      "let me jot this down about the ledgerline rollout".
    expect: >
      The phrase is transcribed and typed as ordinary text — no action fires, and
      the mapped keyword's action is untouched. This is the control: without the
      keyword spoken, dictation just types.
    where: /
  - do: >
      Treatment — dictate a phrase that speaks the mapped keyword during the
      dictation, e.g. say "new note" as configured.
    expect: >
      The mapped action FIRES (dispatch_voice_command) instead of the keyword
      being typed verbatim — the desk performs the bound action, and the keyword
      words do not land as plain text. The only difference from the control is the
      spoken keyword; the mapping is what turned speech into an action.
    where: /
teardown: []
