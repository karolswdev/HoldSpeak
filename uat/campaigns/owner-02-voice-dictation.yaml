title: "2 · Voice and dictation loop"
purpose: >
  Exercise the daily voice loop end to end: hold-to-talk, routing, preview,
  correction and learning, language and symbols, wake word, activity context,
  voice commands, browser inputs, first successful arrival, and presence HUD.
sequence: 2
tier: core
estimated_minutes: 105
prerequisites:
  - A working microphone and browser microphone permission.
  - A local Whisper model installed and a foreign app with an empty text field.
  - The .43 OpenAI-compatible endpoint reachable for model-assisted treatment beats.
  - A quiet room for wake-word checks.
exit_gate:
  - Spoken text can be previewed, committed, corrected, and found again without losing the user's intent.
  - Repeated dictation, unwanted typing, unclear routing, or a broken correction loop stops the campaign for triage.
