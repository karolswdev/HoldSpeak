title: "6 · Sync, mesh, and integrations"
purpose: >
  Exercise user-visible cross-device sync, remote execution, companion handoff,
  proposal approval, GitHub, webhook, Slack, and the delivery-belt action. This
  is functional connectivity work, not database/network hardening.
sequence: 6
tier: extended
estimated_minutes: 135
prerequisites:
  - LAN access, a second device or companion build, tmux, and the .43 endpoint.
  - Authenticated gh against a throwaway repository, plus disposable webhook and Slack destinations.
  - A disposable Delivery Workbench repository for the belt approval leg.
exit_gate:
  - Synced state and remote work remain understandable, attributable, and reviewable from the initiating surface.
  - External actions must be aimed only at the disposable destinations named in the preflight.
scenarios:
  - pack-a-aftercare/a-sync-cross-device
  - pack-b-steering/b-pair-desktop-companion
  - pack-b-steering/b-dictate-into-mac
