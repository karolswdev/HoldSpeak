title: "5 · Flagship iPhone and iPad"
purpose: >
  Verify the actually installed flagship Swift root on physical glass: exact
  production DioStage arrival, native Desk foundation and CRUD, pair and sync,
  capture/save/reopen, iPad diarization and live intelligence, consented steering,
  offline/on-device use, models, profiles, and mesh serving.
sequence: 5
tier: core
