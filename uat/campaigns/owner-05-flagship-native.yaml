prerequisites:
  - Start the conductor with UAT_HOST=0.0.0.0 and select Device sitting.
  - A physical iPhone and iPad with the exact flagship build; record build and OS in the first note.
  - Microphone and Local Network permissions, an installed local GGUF, and .43 reachable for homelab treatment beats.
exit_gate:
