title: "13 · Phase 95 The Desk OS — the owner's verdict"
purpose: >
  The phase that answered the owner's 2026-07-17 verdict closes the same way
  it opened: the owner at the desk, on the production build, judging feel.
  Everything machine-verifiable shipped and walked green (the WebGL stage at
  the frame budget, one window chrome with dock/snap/cycling, every surface
  in-world, fifteen routes demoted to deep links); this campaign records
  whether it now FEELS like a native OS desk.
sequence: 13
tier: close
estimated_minutes: 45
prerequisites:
  - Phase 95 stories 1-9 merged; use the exact production build (record the commit in the sitting notes).
  - A real desktop microphone for the dictation and recording beats.
exit_gate:
  - Every scenario has a verdict on web_react:desktop (the phone-form scenario on web_react:iphone_browser) with notes; non-pass findings triaged per TRIAGE.md into BACKLOG rows.
  - The owner's overall verdict on the Desk OS feel is recorded verbatim in the sitting notes.
